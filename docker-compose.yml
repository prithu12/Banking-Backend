services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MongoDBUrl: mongodb://mongo:27017/backendledger
      JWT_SECRET: change-me
      EMAIL_USER: change-me@example.com
      CLIENT_ID: change-me
      CLIENT_SECRET: change-me
      REFRESH_TOKEN: change-me
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo-data: